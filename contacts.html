<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — Юлия Маликова</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <a class="logo" href="index.html">Юлия Маликова</a>
    <nav>
      <a href="gallery.html">Галерея</a>
      <a href="about.html">О художнике</a>
      <a href="contacts.html" class="active">Контакты</a>
    </nav>
  </header>

  <main>

    <section class="contacts-hero">
      <p class="label">Связаться</p>
      <h1>Контакты</h1>
      <p>Если вас интересует картина, заказ работы или сотрудничество — напишите мне.</p>
    </section>

    <section class="contacts-body">

      <div class="contacts-form-wrap">
        <form class="contacts-form" id="contact-form">
          <div class="form-group">
            <label for="name">Имя</label>
            <input type="text" id="name" placeholder="Ваше имя" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="subject">Тема</label>
            <input type="text" id="subject" placeholder="Тема сообщения">
          </div>
          <div class="form-group">
            <label for="message">Сообщение</label>
            <textarea id="message" rows="5" placeholder="Ваше сообщение..." required></textarea>
          </div>
          <button type="submit" class="btn">Отправить</button>
          <p class="form-status" id="form-status"></p>
        </form>
      </div>

      <div class="contacts-info">
        <div class="contacts-block">
          <p class="label">Email</p>
          <a href="mailto:yulia@malikova-art.kz">yulia@malikova-art.kz</a>
        </div>
        <div class="contacts-block">
          <p class="label">Соцсети</p>
          <div class="social-links">
            <a href="#" target="_blank">Instagram</a>
            <a href="#" target="_blank">Telegram</a>
            <a href="#" target="_blank">WhatsApp</a>
          </div>
        </div>
        <div class="contacts-block">
          <p class="label">Время ответа</p>
          <p>Обычно отвечаю в течение дня</p>
        </div>
      </div>

    </section>

  </main>

  <footer>
    <span>© 2025 Юлия Маликова</span>
    <div class="footer-links">
      <a href="#">Instagram</a>
      <a href="#">Telegram</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
