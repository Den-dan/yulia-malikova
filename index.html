<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель управления</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="alternate icon" href="../favicon.ico">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <!-- ЭКРАН ВХОДА -->
  <div id="login-screen">
    <div class="login-box">
      <p class="label">Панель управления</p>
      <h1>Вход</h1>
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label for="login-password">Пароль</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn" id="login-btn">Войти</button>
      <p class="form-status" id="login-error"></p>
    </div>
  </div>

  <!-- ПАНЕЛЬ УПРАВЛЕНИЯ -->
  <div id="admin-screen" style="display:none">

    <header>
      <a class="logo" href="../index.html">YanArt</a>
      <div style="display:flex;align-items:center;gap:24px">
        <span class="label">Панель управления</span>
        <button class="btn" id="logout-btn">Выйти</button>
      </div>
    </header>

    <main class="admin-main">

      <div class="admin-section">
        <h2>Настройки сайта</h2>
        <div class="site-settings">

          <div class="setting-block">
            <p class="label">Главная картина</p>
            <div class="setting-preview" id="hero-preview-wrap">
              <img id="hero-preview-img" src="" alt="" style="display:none">
              <span id="hero-preview-placeholder">[ не загружена ]</span>
            </div>
            <label class="upload-label">
              Выбрать файл
              <input type="file" id="hero-upload" accept="image/*" style="display:none">
            </label>
            <p class="form-status" id="hero-status"></p>
          </div>

          <div class="setting-block">
            <p class="label">Фото художника</p>
            <div class="setting-preview" id="artist-preview-wrap">
              <img id="artist-preview-img" src="" alt="" style="display:none">
              <span id="artist-preview-placeholder">[ не загружена ]</span>
            </div>
            <label class="upload-label">
              Выбрать файл
              <input type="file" id="artist-upload" accept="image/*" style="display:none">
            </label>
            <p class="form-status" id="artist-status"></p>
          </div>

        </div>
      </div>

      <div class="admin-toolbar">
        <h2>Картины</h2>
        <button class="btn" id="add-btn">+ Добавить картину</button>
      </div>

      <div class="admin-grid" id="admin-grid">
        <!-- карточки картин -->
      </div>

    </main>

  </div>

  <!-- МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ/РЕДАКТИРОВАНИЯ -->
  <div class="modal" id="edit-modal">
    <div class="modal-overlay" id="edit-overlay"></div>
    <div class="edit-modal-content">
      <h2 id="edit-title">Добавить картину</h2>

      <div class="edit-form">

        <div class="form-group">
          <label>Название *</label>
          <input type="text" id="edit-name">
        </div>

        <div class="form-group">
          <label>Описание</label>
          <textarea id="edit-desc" rows="3"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Тип</label>
            <select id="edit-category">
              <option value="Пейзаж">Пейзаж</option>
              <option value="Натюрморт">Натюрморт</option>
              <option value="Абстракция">Абстракция</option>
            </select>
          </div>
          <div class="form-group">
            <label>Год</label>
            <input type="number" id="edit-year" placeholder="2024">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Ширина (см)</label>
            <input type="number" id="edit-width" placeholder="60">
          </div>
          <div class="form-group">
            <label>Высота (см)</label>
            <input type="number" id="edit-height" placeholder="80">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Материал</label>
            <input type="text" id="edit-material" placeholder="Акварель, бумага">
          </div>
          <div class="form-group">
            <label>Цена (₸)</label>
            <input type="number" id="edit-price" placeholder="50000">
          </div>
        </div>

        <!-- ТЕГИ -->
        <div class="form-group">
          <label>Жанр</label>
          <div class="tag-chips" data-tag="genre">
            <button type="button" class="chip" data-value="ботаника">Ботаника</button>
            <button type="button" class="chip" data-value="фуд-арт">Фуд-арт</button>
            <button type="button" class="chip" data-value="детская иллюстрация">Детская</button>
            <button type="button" class="chip" data-value="горы">Горы</button>
            <button type="button" class="chip" data-value="животные">Животные</button>
            <button type="button" class="chip" data-value="люди">Люди</button>
          </div>
        </div>

        <div class="form-group">
          <label>Техника</label>
          <div class="tag-chips" data-tag="technique">
            <button type="button" class="chip" data-value="акварель">Акварель</button>
            <button type="button" class="chip" data-value="графика">Графика</button>
            <button type="button" class="chip" data-value="акварельная иллюстрация">Иллюстрация</button>
          </div>
        </div>

        <div class="form-group">
          <label>Назначение</label>
          <div class="tag-chips" data-tag="purpose">
            <button type="button" class="chip" data-value="кухня">Кухня</button>
            <button type="button" class="chip" data-value="офис">Офис</button>
            <button type="button" class="chip" data-value="кабинет">Кабинет</button>
            <button type="button" class="chip" data-value="спальня">Спальня</button>
            <button type="button" class="chip" data-value="салон">Салон</button>
            <button type="button" class="chip" data-value="мастерская">Мастерская</button>
          </div>
        </div>

        <!-- ФОТО -->
        <div class="form-group">
          <label>Фото картины *</label>
          <label class="upload-label" for="edit-images">
            + Выбрать фото (можно несколько)
          </label>
          <input type="file" id="edit-images" accept="image/*" multiple style="display:none">
          <div class="edit-previews" id="edit-previews"></div>
        </div>

        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="edit-featured">
            На главной странице
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="edit-available" checked>
            В наличии
          </label>
        </div>

      </div>

      <div class="edit-actions">
        <button class="btn" id="edit-cancel">Отмена</button>
        <button class="btn btn-primary" id="edit-save">Сохранить</button>
      </div>
      <p class="form-status" id="edit-status"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
